server {
    listen 80;
    server_name skills4hireapp.com www.skills4hireapp.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name skills4hireapp.com www.skills4hireapp.com;

    ssl_certificate /etc/letsencrypt/live/skills4hireapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skills4hireapp.com/privkey.pem;


    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    location /static/ {
        alias /apps/staticfiles/;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket → ASGI
    location /ws/ {
        proxy_pass http://asgi:8001;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}